<!--
  ProfFound wordmark — standalone SVG (portable, saveable)
  "Pro" in charcoal · "Found" in crimson
  Font: system-ui bold 80px
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 390 100"
  width="390"
  height="100"
  role="img"
  aria-label="ProfFound"
>
  <title>ProfFound</title>

  <text
    y="82"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="80"
    letter-spacing="-1.6"
  >
    <tspan x="8" fill="#1a1a1a">Pro</tspan><tspan fill="#A51C30">Found</tspan>
  </text>

</svg>
